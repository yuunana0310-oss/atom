<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>小学1年生 算数プリント</title>
<style>
  @media print {
    body { margin: 0; }
    .no-print { display: none; }
  }
  body {
    font-family: "游ゴシック", "YuGothic", sans-serif;
    max-width: 720px;
    margin: 40px auto;
    padding: 20px;
    background: #fff;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    border-bottom: 3px solid #333;
    padding-bottom: 8px;
    margin-bottom: 6px;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .meta span {
    border-bottom: 1px solid #333;
    min-width: 120px;
    display: inline-block;
  }
  .section-title {
    font-size: 16px;
    font-weight: bold;
    background: #f0f0f0;
    padding: 4px 10px;
    margin: 24px 0 16px;
    border-left: 4px solid #555;
  }
  .problems {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 40px;
  }
  .problem {
    font-size: 26px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .problem .num {
    font-size: 14px;
    color: #555;
    min-width: 24px;
  }
  .answer-box {
    border-bottom: 2px solid #333;
    min-width: 60px;
    display: inline-block;
    height: 30px;
  }
  .hint {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }
  .illust {
    text-align: center;
    font-size: 28px;
    margin: 8px 0 0;
    letter-spacing: 4px;
  }
</style>
</head>
<body>

<h1>🌸 小学1年生 算数プリント</h1>
<div class="meta">
  なまえ：<span></span>&nbsp;&nbsp; 日づけ：<span></span>&nbsp;&nbsp; てん：<span style="min-width:60px"></span>
</div>

<!-- たし算 -->
<div class="section-title">➕ たしざん（1〜10）</div>
<div class="problems">
  <div class="problem"><span class="num">①</span> 2 + 3 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">②</span> 4 + 1 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">③</span> 6 + 2 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">④</span> 3 + 5 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">⑤</span> 1 + 9 = <span class="answer-box"></span></div>
</div>

<!-- ひき算 -->
<div class="section-title">➖ ひきざん（1〜10）</div>
<div class="problems">
  <div class="problem"><span class="num">⑥</span> 8 − 3 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">⑦</span> 7 − 4 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">⑧</span> 10 − 6 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">⑨</span> 9 − 5 = <span class="answer-box"></span></div>
  <div class="problem"><span class="num">⑩</span> 6 − 1 = <span class="answer-box"></span></div>
</div>

<!-- 文章題 -->
<div class="section-title">📖 もんだい（ぶんしょうだい）</div>
<div style="font-size:18px; line-height:2.2; padding: 0 10px;">
  <p>⑪ りんごが 4こ あります。<br>
  　　2こ もらいました。<br>
  　　ぜんぶで なんこ ですか？</p>
  <div class="illust">🍎🍎🍎🍎　＋　🍎🍎</div>
  <p style="margin-top:12px;">こたえ：<span style="border-bottom:2px solid #333; display:inline-block; min-width:80px;">&nbsp;</span> こ</p>
</div>

<hr style="margin-top:40px; border: 1px dashed #ccc;">
<div style="font-size:13px; color:#999; text-align:center; margin-top:8px;">よくできました！ ⭐ がんばったね</div>

</body>
</html>

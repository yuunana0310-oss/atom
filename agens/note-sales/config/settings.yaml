# note-sales システム設定

app:
  name: "note-sales"
  version: "0.1.0"

paths:
  db: "data/db/note_sales.db"
  raw: "data/raw"
  processed: "data/processed"
  pain_points_json: "data/processed/pain_points.json"

pain_intake:
  # pain_points.json の出力先
  output_json: "data/processed/pain_points.json"
  # 類似判定のJaccardしきい値（0〜1）
  similarity_threshold: 0.5
  # テキストの最小文字数（これ未満はスキップ）
  min_text_length: 15
  # 悩み指標キーワードが1つも無い場合スキップするか
  require_pain_keyword: true

researcher:
  # 出力先
  output_json: "data/processed/topic_candidates.json"
  approvals_json: "data/processed/approvals.json"
  winning_patterns_json: "data/knowledge/winning_patterns.json"
  # 候補件数
  candidates_min: 3
  candidates_max: 5
  # 類似候補の統合しきい値（pain_id Jaccard）
  similarity_threshold: 0.6
  # スコア重み（合計 1.0 になること）
  score_weights:
    demand: 0.30
    monetization: 0.25
    threads_fit: 0.20
    expertise_fit: 0.15
    trend: 0.10
  # 執筆者の専門タグ（expertise_fit_score 計算に使用）
  expertise_tags:
    - "AI活用"
    - "Claude"
    - "ClaudeCode"
    - "生成AI"
    - "副業"
    - "note"
    - "プロンプト"
  # トレンドタグ（trend_score 計算に使用）
  trend_tags:
    - "ClaudeCode"
    - "生成AI"
    - "AI活用"
    - "Claude"
    - "副業"
    - "プロンプト"
    - "noteで稼ぐ"

quality:
  # この点数未満のdraftは次工程に進めない（0-100スケール）
  min_score: 80
  # 記事の最小文字数
  min_chars: 1500
  # 記事の最大文字数
  max_chars: 2500

note_writer:
  # 下書きMarkdownの出力先ディレクトリ
  drafts_dir: "data/processed/drafts"
  # 下書き一覧JSONの出力先
  drafts_json: "data/processed/note_drafts.json"
  # デフォルト価格（円）
  default_price: 300

editor:
  # この点数以上で publish_ready に進む（0-100スケール）
  min_score: 80
  # この点数未満は自動でrevise扱い（将来拡張用）
  revise_threshold: 60

note:
  # 公開は必ず手動承認を経る
  publish_mode: "manual"
  # デフォルト価格（円）
  default_price: 300

publisher:
  # 公開メタデータの保存先
  publications_json: "data/processed/publications.json"
  # キャンペーン管理JSONの保存先
  campaigns_json: "data/processed/campaigns.json"

promo_brief:
  # Threads運用部への引き渡しディレクトリ
  output_dir: "data/processed/promo_briefs"

performance_import:
  # Threads運用部から受け取る成績JSONのディレクトリ
  input_dir: "data/raw/performance"
  # 取り込み済み記録の保存先（アーカイブ用）
  output_json: "data/processed/imported_performance.json"

analytics:
  # 最新レポートの保存先
  output_json: "data/processed/analytics_report.json"
  # 週次レポートのMarkdown出力先ディレクトリ
  weekly_report_dir: "data/processed/weekly_reports"
  # 「反応良い」判定閾値（5% 以上）
  good_reaction_rate: 0.05
  # 「遷移良い」判定閾値（2% 以上）
  good_transition_rate: 0.02
  # 「購入率良い」判定閾値（5% 以上）
  good_purchase_rate: 0.05
  # パターン更新に必要な最低データ数
  min_records_for_pattern: 2

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "data/processed/app.log"

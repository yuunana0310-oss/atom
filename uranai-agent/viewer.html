<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霊視師 月詠 — 鑑定室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:       #0a0a1a;
    --bg-card:       #10102a;
    --bg-card-hover: #161640;
    --surface:       rgba(255,255,255,0.03);
    --border:        rgba(255,255,255,0.06);
    --border-glow:   rgba(140,120,255,0.15);
    --text-primary:   #e8e4f0;
    --text-secondary: #a098b8;
    --text-dim:       #6a6280;
    --accent-purple:  #9b7dff;
    --accent-indigo:  #6c5ce7;
    --accent-gold:    #f0c674;
    --accent-green:   #7ec88a;
    --font-serif: 'Noto Serif JP', serif;
    --font-sans:  'Zen Kaku Gothic New', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --glow-purple: 0 0 40px rgba(155,125,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-sans); line-height: 1.9; min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -40%; left: -20%; width: 140%; height: 140%;
    background:
      radial-gradient(ellipse 600px 600px at 20% 30%, rgba(108,92,231,0.08), transparent),
      radial-gradient(ellipse 500px 500px at 80% 60%, rgba(155,125,255,0.06), transparent);
    pointer-events: none; z-index: 0; animation: ambientDrift 25s ease-in-out infinite alternate;
  }
  @keyframes ambientDrift { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,20px); } }

  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
  @keyframes twinkle { 0% { opacity: var(--o1); transform: scale(1); } 100% { opacity: var(--o2); transform: scale(1.4); } }

  .container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 24px 100px; }
  
  .header { text-align: center; margin-bottom: 50px; padding-top: 20px; }
  .header .moon-icon { font-size: 48px; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 12px rgba(240,198,116,0.4)); animation: moonFloat 4s ease-in-out infinite; }
  @keyframes moonFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .header h1 { font-family: var(--font-serif); font-size: 28px; letter-spacing: 0.12em; color: var(--accent-gold); margin-bottom: 6px; }
  .header .subtitle { font-family: var(--font-serif); font-size: 14px; color: var(--text-secondary); letter-spacing: 0.2em; }

  .mode-switch { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
  .mode-btn { background: none; border: none; color: var(--text-dim); font-family: var(--font-serif); font-size: 18px; letter-spacing: 0.15em; cursor: pointer; padding: 10px 20px; position: relative; transition: all 0.3s ease; }
  .mode-btn.active { color: var(--accent-gold); text-shadow: 0 0 15px rgba(240,198,116,0.3); }
  .mode-btn.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 1px; background: var(--accent-gold); }

  .sign-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 40px; }
  .sign-tab { padding: 8px 16px; border: 1px solid var(--border); border-radius: 100px; background: var(--surface); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.3s ease; }
  .sign-tab.active { border-color: var(--accent-purple); color: var(--accent-gold); background: rgba(155,125,255,0.1); box-shadow: var(--glow-purple); }
  .sign-tab.disabled { opacity: 0.3; cursor: not-allowed; }

  .meishiki-controls { display: none; text-align: center; margin-bottom: 40px; }
  .meishiki-controls.active { display: block; animation: fadeIn 0.4s ease; }
  .input-group { display: inline-flex; gap: 10px; background: var(--surface); border: 1px solid var(--border); padding: 6px 20px; border-radius: 100px; }
  .input-group input { background: none; border: none; color: var(--text-primary); font-size: 14px; outline: none; width: 140px; }
  .load-btn { background: var(--accent-indigo); color: white; border: none; padding: 8px 24px; border-radius: 100px; cursor: pointer; }

  .week-bar { text-align: center; padding: 14px 20px; background: rgba(155,125,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 36px; font-size: 13px; color: var(--text-secondary); }

  .article { animation: fadeInUp 0.6s ease; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .article h1 { font-family: var(--font-serif); font-size: 24px; color: var(--accent-gold); text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  .article h2 { font-family: var(--font-serif); font-size: 20px; color: var(--accent-purple); margin: 48px 0 20px; border-left: 3px solid var(--accent-purple); padding-left: 16px; }
  .article h3 { font-family: var(--font-sans); font-size: 17px; color: var(--text-primary); margin: 32px 0 14px; padding: 12px 18px; background: rgba(155,125,255,0.05); border-radius: var(--radius-sm); }
  .article p { font-family: var(--font-serif); font-size: 16px; margin-bottom: 18px; text-align: justify; }
  .article strong { color: var(--accent-gold); }
  .article hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--border-glow), transparent); margin: 40px 0; }
  .article ul { margin-bottom: 18px; padding-left: 20px; color: var(--text-secondary); }

  .action-bar { text-align: center; margin: 40px 0; }
  .copy-btn { padding: 12px 32px; background: rgba(155,125,255,0.1); border: 1px solid var(--accent-purple); border-radius: 100px; color: var(--accent-purple); cursor: pointer; transition: 0.3s; }
  .copy-btn:hover { background: rgba(155,125,255,0.2); transform: translateY(-2px); }

  .loading { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
  .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top: 2px solid var(--accent-purple); border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .footer { text-align: center; margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header class="header">
    <span class="moon-icon">🌙</span>
    <h1>霊視師 月詠</h1>
    <div class="subtitle">— 鑑定室 —</div>
  </header>

  <nav class="mode-switch">
    <button class="mode-btn active" id="modeWeekly" onclick="switchMode('weekly')">週間占い</button>
    <button class="mode-btn" id="modeMeishiki" onclick="switchMode('meishiki')">個人鑑定書</button>
  </nav>

  <nav class="sign-tabs" id="signTabs"></nav>

  <div class="meishiki-controls" id="meishikiControls">
    <div class="input-group">
      <input type="text" id="birthDateInput" placeholder="例: 19901101" maxlength="8">
      <button class="load-btn" onclick="loadPersonalMeishiki()">霊視を開始</button>
    </div>
    <p style="font-size: 11px; color: var(--text-dim); margin-top: 12px;">生成済みの鑑定書（日付8桁）を入力してください</p>
  </div>

  <div class="week-bar" id="infoBar">読み込み中...</div>
  <div id="articleContainer"></div>

  <footer class="footer">
    <div style="font-family: var(--font-serif); font-size: 14px; margin-bottom: 8px;">— 霊視師 月詠 —</div>
    <div>© 2026 Tsukiyomi. All rights reserved.</div>
  </footer>
</div>

<script>
const ZODIAC = [
  { en: 'aries', jp: 'おひつじ座', symbol: '♈', num: '01' }, { en: 'taurus', jp: 'おうし座', symbol: '♉', num: '02' },
  { en: 'gemini', jp: 'ふたご座', symbol: '♊', num: '03' }, { en: 'cancer', jp: 'かに座', symbol: '♋', num: '04' },
  { en: 'leo', jp: 'しし座', symbol: '♌', num: '05' }, { en: 'virgo', jp: 'おとめ座', symbol: '♍', num: '06' },
  { en: 'libra', jp: 'てんびん座', symbol: '♎', num: '07' }, { en: 'scorpio', jp: 'さそり座', symbol: '♏', num: '08' },
  { en: 'sagittarius', jp: 'いて座', symbol: '♐', num: '09' }, { en: 'capricorn', jp: 'やぎ座', symbol: '♑', num: '10' },
  { en: 'aquarius', jp: 'みずがめ座', symbol: '♒', num: '11' }, { en: 'pisces', jp: 'うお座', symbol: '♓', num: '12' }
];

let currentMode = 'weekly';
let currentRawMd = "";
let availableSigns = [];
let weekInfo = null;

function getWeekInfo() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const weekNum = Math.ceil((((now - jan1) / 86400000) + 1 + jan1.getDay()) / 7);
  const mon = new Date(now); mon.setDate(now.getDate() + (now.getDay() === 0 ? -6 : 1) - now.getDay());
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const f = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  return { folder: `${now.getFullYear()}-W${String(weekNum).padStart(2,'0')}`, label: `${now.getFullYear()}年第${weekNum}週`, range: `${f(mon)} 〜 ${f(sun)}` };
}

function mdToHtml(md) {
  md = md.replace(/^---[\s\S]*?---\s*/, '');
  let html = '';
  const lines = md.split('\n');
  let inPara = false; let inList = false;
  for (let line of lines) {
    line = line.trim();
    if (!line) { 
      if (inPara) html += '</p>'; inPara = false; 
      if (inList) html += '</ul>'; inList = false;
      continue; 
    }
    if (line.startsWith('# ')) { html += `<h1>${line.slice(2)}</h1>`; continue; }
    if (line.startsWith('## ')) { html += `<h2>${line.slice(3)}</h2>`; continue; }
    if (line.startsWith('### ')) { html += `<h3>${line.slice(4)}</h3>`; continue; }
    if (line.startsWith('- ')) { 
      if (!inList) html += '<ul>'; inList = true;
      html += `<li>${line.slice(2)}</li>`; continue;
    }
    if (line === '---' || line === '***') { html += '<hr>'; continue; }
    line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>');
    if (!inPara && !inList) { html += '<p>'; inPara = true; }
    else if (inPara) { html += '<br>'; }
    html += line;
  }
  return html;
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeWeekly').classList.toggle('active', mode === 'weekly');
  document.getElementById('modeMeishiki').classList.toggle('active', mode === 'meishiki');
  document.getElementById('signTabs').style.display = mode === 'weekly' ? 'flex' : 'none';
  document.getElementById('meishikiControls').classList.toggle('active', mode === 'meishiki');
  if (mode === 'weekly') {
    document.getElementById('infoBar').innerHTML = `<strong>${weekInfo.label}</strong>（${weekInfo.range}）`;
    if (availableSigns.length) selectSign(ZODIAC.find(s => availableSigns.includes(s.en)));
  } else {
    document.getElementById('infoBar').innerHTML = '個人鑑定書を選択してください';
    document.getElementById('articleContainer').innerHTML = '<div class="loading"><p>日付を入力して霊視を開始してください。</p></div>';
  }
}

async function selectSign(sign) {
  document.querySelectorAll('.sign-tab').forEach(t => t.classList.toggle('active', t.dataset.sign === sign.en));
  const container = document.getElementById('articleContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`output/${weekInfo.folder}/${sign.num}_${sign.en}.md`);
    if (!res.ok) throw new Error();
    currentRawMd = await res.text();
    render();
  } catch { container.innerHTML = '<p class="loading">見つかりませんでした</p>'; }
}

async function loadPersonalMeishiki() {
  const d = document.getElementById('birthDateInput').value.trim();
  if (d.length !== 8) { alert('8桁で入力してください'); return; }
  const container = document.getElementById('articleContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`output/meishiki/meishiki_${d}.md`);
    if (!res.ok) throw new Error();
    currentRawMd = await res.text();
    document.getElementById('infoBar').innerHTML = `<strong>個人鑑定書</strong> — ${d}`;
    render();
  } catch { container.innerHTML = '<p class="loading">鑑定書が見つかりませんでした</p>'; }
}

function render() {
  document.getElementById('articleContainer').innerHTML = `
    <article class="article">${mdToHtml(currentRawMd)}</article>
    <div class="action-bar"><button class="copy-btn" onclick="copy()">📋 note用にコピー</button></div>
  `;
}

function copy() {
  const clean = currentRawMd.replace(/^---[\s\S]*?---\s*/, '').trim();
  navigator.clipboard.writeText(clean).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ コピー成功！';
    setTimeout(() => btn.textContent = '📋 note用にコピー', 2000);
  });
}

function generateStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--o1:${Math.random()*0.3+0.1};--o2:${Math.random()*0.5+0.5};--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s;`;
    c.appendChild(s);
  }
}

async function init() {
  weekInfo = getWeekInfo();
  generateStars();
  const tabs = document.getElementById('signTabs');
  for (const s of ZODIAC) {
    const res = await fetch(`output/${weekInfo.folder}/${s.num}_${s.en}.md`);
    if (res.ok) {
      availableSigns.push(s.en);
      const t = document.createElement('div'); t.className = 'sign-tab'; t.dataset.sign = s.en; t.innerHTML = `${s.symbol} ${s.jp}`;
      t.onclick = () => selectSign(s); tabs.appendChild(t);
    }
  }
  switchMode('weekly');
}
init();
</script>
</body>
</html>
